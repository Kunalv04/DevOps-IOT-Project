name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend ./task1/backend

    - name: Build React Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/react ./task1/frontend

    - name: Build LAMP Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/lamp ./task1/lamp

    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend

    - name: Push React Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/react

    - name: Push LAMP Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/lamp

  Test:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run Tests
      run: |
        cd task1/backend
        npm install
        npm test

    - name: Run Frontend Tests
      run: |
        cd task1/frontend
        npm install
        npm test

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.organization=KGDEVOPS
          -Dsonar.projectKey=IOT-Project
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  Deploy:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy Application
      run: |
        cd task1
        docker-compose up -d
