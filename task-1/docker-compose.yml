version: 3

services:

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - react
      - apache

  apache:
    build: ./lamp
    ports:
      - "8080:80"

  mysql:
    image: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_USER: sqldbuser
      MYSQL_PASSWORD: dbpassword

  mongodb:
    image: mongo:Latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  backend:
    build: ./backend
    port:
      - "5000:5000"



