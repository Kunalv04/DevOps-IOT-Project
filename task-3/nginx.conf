events {}

http {
    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=limit:10m rate=10r/s;
    server {
        listen 80;

        location /app/ {
            proxy_pass http://react/;
        }

        location /legacy/ {
            proxy_pass http://apache/;
        }

        location /api/ {
            proxy_pass http://backend:5000/;
        }

    }
}